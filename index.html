        // Static News Database
        const NEWS_ARTICLES = [
            {
                id: 1,
                title: "Metformin for Longevity: The TAME Trial & Cellular Rejuvenation",
                category: "Longevity Science",
                summary: "Can a 60-year-old diabetes medication delay aging? Researchers explain the cellular mechanisms of Metformin in mimicking caloric restriction and suppressing AMPK-induced aging pathways.",
                date: "June 12, 2026",
                source: "Longevity Medicine Review",
                readTime: "6 min read",
                content: "Metformin is historically a glucose-lowering drug. However, the upcoming Targeting Aging with Metformin (TAME) trial seeks to prove it delays chronic diseases. Its mechanism involves activating AMPK (AMP-activated protein kinase) and enhancing mitochondrial efficiency, thereby suppressing inflammation and systemic aging.",
                bookmarked: false
            },
            {
                id: 2,
                title: "The Great CGM Revolution: Beyond Diabetes with Dexcom Stelo",
                category: "Health Technology",
                summary: "Dexcom's FDA-approved over-the-counter Stelo glucose monitor opens metabolic health tracking to everyone. How non-diabetics are using glucose trends to optimize energy, focus, and longevity.",
                date: "June 14, 2026",
                source: "Digital Health Insider",
                readTime: "5 min read",
                content: "Continuous Glucose Monitors (CGMs) like the Dexcom Stelo are transforming wellness. By tracking glucose in real-time, users can identify insulin spikes, optimize food sequencing (eating fiber/protein before carbs), and improve physical endurance without the need for a prescription.",
                bookmarked: false
            },
            {
                id: 3,
                title: "Blood Pressure & Sodium Sensitivity Debate: New Guidelines",
                category: "Cardio Health",
                summary: "Is restricting salt beneficial for everyone? Emerging clinical debates show sodium sensitivity varies heavily by genetics, suggesting highly personalized hydration and potassium-to-sodium ratios instead.",
                date: "May 28, 2026",
                source: "American Heart Forum",
                readTime: "8 min read",
                content: "For decades, universal salt restriction was the primary defense against hypertension. Modern cardiovascular research suggests only 50% of hypertensive individuals are genuinely salt-sensitive. Balancing sodium with adequate dietary potassium (ideal ratio 1:2) is showing superior clinical outcomes for arterial elasticity.",
                bookmarked: false
            },
            {
                id: 4,
                title: "Rapamycin vs. Metformin: Comparing the Giants of Anti-Aging",
                category: "Longevity Science",
                summary: "A head-to-head comparison of MTOR inhibition vs. AMPK activation. Longevity clinical trials are debating whether combination therapy yields exponential protective gains or increases side effects.",
                date: "June 10, 2026",
                source: "Geroscience Journal",
                readTime: "7 min read",
                content: "Rapamycin acts as a highly selective inhibitor of mTOR (mechanistic target of rapamycin), promoting autophagy and cellular cleanup. Metformin acts as an insulin sensitizer. Together, they represent a double-edged sword: Rapamycin suppresses growth signals while Metformin optimizes energy. Combining low doses shows highly protective synergy in murine studies, with human trials starting soon.",
                bookmarked: true
            }
        ];

        // Demo Initial State
        const INITIAL_GLUCOSE = [
            { id: 1, value: 98, timeOfDay: 'Morning', mealContext: 'Fasting', date: '2026-06-17', notes: 'Fasting sugar looking very stable.' },
            { id: 2, value: 135, timeOfDay: 'Afternoon', mealContext: 'After Meal', date: '2026-06-16', notes: 'Post lunch. Had a small carb serving.' },
            { id: 3, value: 104, timeOfDay: 'Evening', mealContext: 'Before Meal', date: '2026-06-16', notes: 'Before dinner. Walked 15 mins.' },
            { id: 4, value: 92, timeOfDay: 'Morning', mealContext: 'Fasting', date: '2026-06-16', notes: 'Woke up feeling refreshed.' },
            { id: 5, value: 112, timeOfDay: 'Evening', mealContext: 'After Meal', date: '2026-06-15', notes: '2h post light dinner.' },
            { id: 6, value: 101, timeOfDay: 'Morning', mealContext: 'Fasting', date: '2026-06-15', notes: 'Steady sleep baseline.' }

        const INITIAL_BP = [
            { id: 1, systolic: 118, diastolic: 79, pulse: 68, timeOfDay: 'Morning', date: '2026-06-17', notes: 'Optimal pressure, hydrated.' },
            { id: 2, systolic: 121, diastolic: 81, pulse: 72, timeOfDay: 'Evening', date: '2026-06-16', notes: 'Slightly elevated post evening workout.' },
            { id: 3, systolic: 116, diastolic: 78, pulse: 65, timeOfDay: 'Morning', date: '2026-06-16', notes: 'Felt very relaxed.' },
            { id: 4, systolic: 124, diastolic: 82, pulse: 70, timeOfDay: 'Evening', date: '2026-06-15', notes: 'Slightly stressed after work.' },
            { id: 5, systolic: 119, diastolic: 77, pulse: 66, timeOfDay: 'Morning', date: '2026-06-15', notes: 'Good sleep recovery.' }

        const INITIAL_MEDICATIONS = [

            { id: 2, name: 'Lisinopril', dosage: '10mg', morning: true, evening: false, active: true },

            { id: 4, name: 'Omega-3 Fish Oil', dosage: '1000mg', morning: true, evening: true, active: true },

        const INITIAL_CHAT = [
            { sender: 'ai', text: 'Hello Mikail! I am Dr. AI, your private, secure medical co-pilot. I have analyzed your health tracker profile: you are 46 years old (born July 23, 1979). I see your active daily medications (Metformin, Lisinopril, Atorvastatin, Omega-3, CoQ10), your latest blood pressure (118/79 mmHg), and your latest glucose readings via the Dexcom Stelo CGM (averaging 104 mg/dL).\n\nHow can I help you today? You can ask about your glucose trends, the interaction of your medications, or your latest Lipid/Thyroid lab results.' }
        ];

        // Main App Component
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [glucose, setGlucose] = useState(() => JSON.parse(localStorage.getItem('ht_glucose')) || INITIAL_GLUCOSE);
            const [bp, setBp] = useState(() => JSON.parse(localStorage.getItem('ht_bp')) || INITIAL_BP);
            const [medications, setMedications] = useState(() => JSON.parse(localStorage.getItem('ht_medications')) || INITIAL_MEDICATIONS);
            const [adherence, setAdherence] = useState(() => JSON.parse(localStorage.getItem('ht_adherence')) || INITIAL_ADHERENCE);
            const [documents, setDocuments] = useState(() => JSON.parse(localStorage.getItem('ht_docs')) || INITIAL_DOCS);
            const [chatHistory, setChatHistory] = useState(() => JSON.parse(localStorage.getItem('ht_chat')) || INITIAL_CHAT);
            const [news, setNews] = useState(() => JSON.parse(localStorage.getItem('ht_news')) || NEWS_ARTICLES);
            const [selectedNews, setSelectedNews] = useState(null);

            // Synchronize with LocalStorage for offline-first compliance
            useEffect(() => {
                localStorage.setItem('ht_glucose', JSON.stringify(glucose));
            }, [glucose]);

            useEffect(() => {
                localStorage.setItem('ht_bp', JSON.stringify(bp));
            }, [bp]);

            useEffect(() => {
                localStorage.setItem('ht_medications', JSON.stringify(medications));
            }, [medications]);

            useEffect(() => {
                localStorage.setItem('ht_adherence', JSON.stringify(adherence));
            }, [adherence]);

            useEffect(() => {
                localStorage.setItem('ht_docs', JSON.stringify(documents));
            }, [documents]);

            useEffect(() => {
                localStorage.setItem('ht_chat', JSON.stringify(chatHistory));
            }, [chatHistory]);

            useEffect(() => {
                localStorage.setItem('ht_news', JSON.stringify(news));
            }, [news]);

            // Helper to get status colors
            const getGlucoseStatus = (value) => {
                if (value < 70) return { label: 'Low', color: 'text-red-600 bg-red-50 border-red-200', dot: 'bg-red-500' };
                if (value <= 110) return { label: 'Optimal', color: 'text-emerald-600 bg-emerald-50 border-emerald-200', dot: 'bg-emerald-500' };
                if (value <= 140) return { label: 'Pre-Meal Target', color: 'text-amber-600 bg-amber-50 border-amber-200', dot: 'bg-amber-500' };
                return { label: 'High', color: 'text-red-600 bg-red-50 border-red-200', dot: 'bg-red-500' };
            };

            const getBPStatus = (sys, dia) => {
                if (sys < 120 && dia < 80) return { label: 'Normal', color: 'text-emerald-600 bg-emerald-50 border-emerald-200', dot: 'bg-emerald-500' };
                if (sys <= 129 && dia < 80) return { label: 'Elevated', color: 'text-amber-500 bg-amber-50/50 border-amber-200', dot: 'bg-amber-400' };
                if (sys <= 139 || dia <= 89) return { label: 'Hypertension S1', color: 'text-amber-600 bg-amber-50 border-amber-200', dot: 'bg-amber-500' };
                return { label: 'Hypertension S2', color: 'text-red-600 bg-red-50 border-red-200', dot: 'bg-red-500' };
            };

            const latestGlucose = glucose[0] || { value: '--', date: '', notes: '', mealContext: '', timeOfDay: '' };
            const latestBP = bp[0] || { systolic: '--', diastolic: '--', pulse: '--', date: '', notes: '' };

                if (window.confirm("Are you sure you want to reset all data to default values?")) {
                    localStorage.removeItem('ht_glucose');
                    localStorage.removeItem('ht_bp');
                    localStorage.removeItem('ht_medications');
                    localStorage.removeItem('ht_adherence');
                    localStorage.removeItem('ht_docs');
                    localStorage.removeItem('ht_chat');
                    localStorage.removeItem('ht_news');
                    setGlucose(INITIAL_GLUCOSE);
                    setBp(INITIAL_BP);
                    setMedications(INITIAL_MEDICATIONS);
                    setAdherence(INITIAL_ADHERENCE);
                    setDocuments(INITIAL_DOCS);
                    setChatHistory(INITIAL_CHAT);
                    setNews(NEWS_ARTICLES);
                }

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-50">

                    <aside className="hidden md:flex flex-col w-64 bg-slate-900 text-slate-300 border-r border-slate-800">
                        <div className="p-6 flex items-center space-x-3 border-b border-slate-800 bg-slate-950">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                                <Icons.Sparkles className="w-6 h-6 text-indigo-200 animate-pulse" />
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-white tracking-wide">Healty Tracker</h1>
                                <span className="text-xs text-slate-400 font-medium uppercase tracking-widest">Workspace</span>
                            </div>
                        </div>

                        <nav className="flex-1 p-4 space-y-1.5 overflow-y-auto">
                            <button onClick={() => { setActiveTab('dashboard'); setSelectedNews(null); }} className={`flex items-center space-x-3 w-full px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-md' : 'hover:bg-slate-800 text-slate-400 hover:text-white'}`}>
                                <Icons.Dashboard />
                                <span>Dashboard</span>
                            </button>
                            <button onClick={() => { setActiveTab('upload'); setSelectedNews(null); }} className={`flex items-center space-x-3 w-full px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'upload' ? 'bg-indigo-600 text-white shadow-md' : 'hover:bg-slate-800 text-slate-400 hover:text-white'}`}>
                                <Icons.Upload />
                                <span>Upload & Logs</span>
                            </button>
                            <button onClick={() => { setActiveTab('meds'); setSelectedNews(null); }} className={`flex items-center space-x-3 w-full px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'meds' ? 'bg-indigo-600 text-white shadow-md' : 'hover:bg-slate-800 text-slate-400 hover:text-white'}`}>
                                <Icons.Pill />
                                <span>Medications</span>
                            </button>
                            <button onClick={() => { setActiveTab('drai'); setSelectedNews(null); }} className={`flex items-center space-x-3 w-full px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'drai' ? 'bg-indigo-600 text-white shadow-md' : 'hover:bg-slate-800 text-slate-400 hover:text-white'}`}>
                                <Icons.Stethoscope />
                                <span className="flex items-center justify-between w-full">
                                    <span>Dr. AI Agent</span>
                                    <span className="bg-emerald-500 text-slate-950 font-bold px-1.5 py-0.5 rounded text-[10px] uppercase">Online</span>
                                </span>
                            </button>
                            <button onClick={() => { setActiveTab('news'); setSelectedNews(null); }} className={`flex items-center space-x-3 w-full px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'news' ? 'bg-indigo-600 text-white shadow-md' : 'hover:bg-slate-800 text-slate-400 hover:text-white'}`}>
                                <Icons.News />
                                <span>Longevity & News</span>
                            </button>
                            <button onClick={() => { setActiveTab('export'); setSelectedNews(null); }} className={`flex items-center space-x-3 w-full px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'export' ? 'bg-indigo-600 text-white shadow-md' : 'hover:bg-slate-800 text-slate-400 hover:text-white'}`}>
                                <Icons.Database />
                                <span>Data & Reports</span>
                            </button>
                        </nav>

        /* 2. UPLOAD & MANUAL LOGS COMPONENT */

            const [bpSys, setBpSys] = useState('118');
            const [bpDia, setBpDia] = useState('78');
            const [bpPulse, setBpPulse] = useState('68');
            const [bpTime, setBpTime] = useState('Morning');

                    notes: glNotes

                e.preventDefault();
                const newReading = {
                    id: Date.now(),
                    systolic: parseInt(bpSys),
                    diastolic: parseInt(bpDia),
                    pulse: parseInt(bpPulse),
                    timeOfDay: bpTime,
                    date: bpDate,
                    notes: bpNotes
                };
                setBp([newReading, ...bp]);
                setBpNotes('');
                alert('Blood Pressure vital logged successfully!');
            };

            // File selection emulation
            const handleFileChange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    setSelectedFile(e.target.files[0]);
                }
            };

            const triggerDemoFile = (type) => {
                if (type === 'stelo') {
                    setSelectedFile({
                        name: 'Stelo_CGM_Report_June_17.png',
                        size: 2450000,
                        type: 'image/png'
                    });
                    setUploadCategory('Stelo CGM Screenshot');
                } else {
                    setSelectedFile({
                        name: 'Quest_Diagnostics_Metabolic_Panel.pdf',
                        size: 1540000,

            const handleSimulatedOCR = () => {
                if (!selectedFile) return;

                setIsUploading(true);
                setUploadProgress(10);
                setScanLog(["Initializing AI OCR Sandbox...", "Uploading file locally..."]);

                const runLogSteps = [
                    { progress: 30, text: "Scanning document pixels and structural vectors..." },
                    { progress: 50, text: `Auto-Detecting Category: Match found -> [${uploadCategory === 'Auto-Detect OCR' ? 'Stelo CGM SmartScreenshot' : uploadCategory}]` },
                    { progress: 75, text: "Parsing medical metrics using Longevity-optimized LLM..." },
                    { progress: 90, text: "Validating clinical range variables... Status: Success." },
                    { progress: 100, text: "Integrating data directly with Mikail's active context." }
                ];

                runLogSteps.forEach((step, index) => {
                    setTimeout(() => {
                        setUploadProgress(step.progress);
                        setScanLog(prev => [...prev, step.text]);
                        
                        if (step.progress === 100) {
                            setTimeout(() => {
                                // Add to documents
                                const isStelo = selectedFile.name.toLowerCase().includes('stelo') || uploadCategory.includes('Stelo');
                                const docCategory = isStelo ? 'Stelo CGM Screenshot' : 'Lipid Panel';
                                const extractedData = isStelo 
                                    ? 'Avg Glucose: 108 mg/dL. Fasting morning steady. No extreme spikes.' 
                                    : 'Cholesterol: 188 mg/dL (Desirable), Triglycerides: 110 (Optimal).';

                                const newDoc = {
                                    id: Date.now(),
                                    name: selectedFile.name,
                                    type: selectedFile.type,
                                    category: docCategory,
                                    size: `${(selectedFile.size / (1024 * 1024)).toFixed(1)} MB`,
                                    date: '2026-06-17',
                                    status: 'Parsed Successfully',
                                    extracted: extractedData
                                };

                                setDocuments([newDoc, ...documents]);

                                // Auto-inject a reading if it's a Stelo report
                                if (isStelo) {
                                    const autoGlucose = {
                                        id: Date.now() + 1,
                                        value: 108,
                                        timeOfDay: 'Morning',
                                        mealContext: 'Fasting',
                                        date: '2026-06-17',
                                        notes: 'Auto-extracted from uploaded Stelo Screenshot.'
                                    };
                                    setGlucose([autoGlucose, ...glucose]);
                                }

                                setIsUploading(false);
                                setSelectedFile(null);
                                setScanLog([]);
                                alert('AI OCR Processing Complete! Your vitals have been updated.');
                            }, 800);
                        }
                    }, (index + 1) * 700);

                            <div className="bg-indigo-50 rounded-2xl p-4 border border-indigo-100 flex items-start space-x-3.5 text-xs text-indigo-900 leading-relaxed">
                                <Icons.Sparkles className="w-5 h-5 text-indigo-500 flex-shrink-0 mt-0.5" />
                                <div>
                                    <strong className="font-bold text-indigo-950 block mb-1">Dr. AI Clinician Takeaway for Mikail:</strong>
                                    This research relates deeply to your ongoing regimen of metformin. Split metabolic cellular dosage ensures high tissue saturation while mitigating systemic inflammatory pathways (senescence).
                                </div>
                            </div>
                        </div>
                    ) : (
                        /* GRID LIST VIEW */
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {filteredNews.map((art) => (
                                <div 
                                    key={art.id} 
                                    onClick={() => setSelectedNews(art)}
                                    className="bg-white hover:bg-indigo-50/10 rounded-3xl border border-slate-200/80 hover:border-indigo-200/80 p-5 shadow-sm hover:shadow-md transition-all cursor-pointer flex flex-col justify-between space-y-4"
                                >
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] bg-indigo-50 text-indigo-700 font-extrabold px-2.5 py-0.5 rounded-full uppercase tracking-wider">
                                                {art.category}
                                            </span>
                                            <button onClick={(e) => handleToggleBookmark(art.id, e)} className="text-slate-300 hover:text-indigo-600">
                                                {art.bookmarked ? (
                                                    <span className="text-amber-500 text-base">★</span>
                                                ) : (
                                                    <span className="text-slate-300 text-base">☆</span>
                                                )}
                                            </button>
                                        </div>
                                        <h3 className="text-base font-bold text-slate-900 leading-snug hover:text-indigo-600 transition-all">
                                            {art.title}
                                        </h3>
                                        <p className="text-xs text-slate-500 leading-relaxed line-clamp-3">
                                            {art.summary}
                                        </p>
                                    </div>

                                    <div className="flex items-center justify-between text-[11px] text-slate-400 border-t border-slate-50 pt-3 font-medium">
                                        <span>{art.source} • {art.date}</span>
                                        <span className="text-indigo-600 font-bold flex items-center">
                                            Read More <Icons.ArrowRight className="w-3.5 h-3.5 ml-1" />
                                        </span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        /* 6. DATA EXPORT & REPORTS COMPONENT (PDF KEEP DATAS) */
        function DataExportView({ glucose, bp, medications, documents, handleClearAllData }) {
            
            const handlePrintReport = () => {
                window.print();
            };

            return (
                <div className="space-y-6">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h2 className="text-2xl font-black text-slate-900 tracking-tight">Health Data Export & Reports</h2>
                            <p className="text-sm text-slate-500">Download formatted PDF medical dossiers to present directly to your doctor during clinical visits.</p>
                        </div>
                        <div className="flex gap-2 w-full md:w-auto">
                            <button 
                                onClick={handleClearAllData}
                                className="flex-1 md:flex-none px-4 py-2.5 bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-700 font-bold rounded-xl text-xs transition-all"
                            >
                                Reset Sandbox Data
                            </button>
                            <button 
                                onClick={handlePrintReport}
                                className="flex-1 md:flex-none px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-xs flex items-center justify-center space-x-2 shadow-md transition-all"
                            >
                                <Icons.Download className="w-4 h-4 text-white" />
                                <span>Export PDF Report</span>
                            </button>
                        </div>
                    </div>

                    {/* PRINT COMPLIANT COMPACT SUMMARY CARD */}
                    <div id="print-area" className="bg-white border border-slate-200 rounded-3xl p-6 md:p-8 space-y-6 shadow-sm">
                        
                        {/* PDF BRANDING HEADER */}
                        <div className="flex justify-between items-start border-b border-slate-200 pb-6">
                            <div>
                                <span className="text-[10px] bg-slate-100 text-slate-600 font-extrabold px-2.5 py-0.5 rounded-full uppercase tracking-wider">Clinical Vitals Summary Dossier</span>
                                <h3 className="text-2xl font-black text-slate-900 mt-2">Healty Tracker Report</h3>
                                <p className="text-xs text-slate-400 mt-0.5">Report compiled dynamically on June 17, 2026</p>
                            </div>
                            <div className="text-right text-xs">
                                <h4 className="font-extrabold text-slate-800">Mikail KOCAK</h4>
                                <span className="text-slate-400">DOB: 23-July-1979 (Age 46)</span>
                                <span className="block text-[10px] text-slate-500 font-medium">Gender: Male</span>
                            </div>
                        </div>

                        {/* SUMMARY CARDS GRID */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Last Blood Sugar</span>
                                <h4 className="text-xl font-extrabold text-slate-800 mt-1">{glucose[0]?.value || '--'} mg/dL</h4>
                                <span className="text-[10px] text-emerald-600 font-semibold">{glucose[0]?.mealContext || 'Fasting'}</span>
                            </div>
                            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Last Blood Pressure</span>
                                <h4 className="text-xl font-extrabold text-slate-800 mt-1">{bp[0] ? `${bp[0].systolic}/${bp[0].diastolic}` : '--/--'}</h4>
                                <span className="text-[10px] text-slate-500 font-semibold">Pulse: {bp[0]?.pulse || '--'} bpm</span>
                            </div>
                            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 col-span-2">
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Active Medication Regimen</span>
                                <p className="text-[11px] font-extrabold text-slate-800 mt-1 leading-normal truncate">
                                    {medications.filter(m=>m.active).map(m=>m.name).join(', ')}
                                </p>
                                <span className="text-[10px] text-indigo-600 font-semibold">Morning & Evening Dosing</span>
                            </div>
                        </div>

                        {/* DETAILED TABLES */}
                        <div className="space-y-6 pt-4 border-t border-slate-100">
                            
                            {/* GLUCOSE LOG */}
                            <div>
                                <h4 className="text-xs font-bold text-slate-800 uppercase tracking-wider mb-2.5">1. Historical Blood Glucose Logs</h4>
                                <div className="border border-slate-100 rounded-2xl overflow-hidden">
                                    <table className="w-full text-left text-xs bg-white">
                                        <thead>
                                            <tr className="bg-slate-50 border-b border-slate-100 text-slate-500 uppercase font-semibold">

                                                <th className="p-3">Schedule Context</th>
                                                <th className="p-3">Extracted notes</th>

                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {glucose.map((g) => (
                                                <tr key={g.id}>
                                                    <td className="p-3 font-semibold text-slate-600">{g.date}</td>
                                                    <td className="p-3 font-bold text-slate-800">{g.value} mg/dL</td>
                                                    <td className="p-3">
                                                        <span className="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-[10px] font-bold">
                                                            {g.timeOfDay} • {g.mealContext}

                                                    </td>
                                                    <td className="p-3 text-slate-500 italic font-medium">{g.notes || '--'}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* BLOOD PRESSURE LOG */}
                            <div>
                                <h4 className="text-xs font-bold text-slate-800 uppercase tracking-wider mb-2.5">2. Historical Blood Pressure Logs</h4>
                                <div className="border border-slate-100 rounded-2xl overflow-hidden">
                                    <table className="w-full text-left text-xs bg-white">
                                        <thead>
                                            <tr className="bg-slate-50 border-b border-slate-100 text-slate-500 uppercase font-semibold">

                                                <th className="p-3">Blood Pressure (mmHg)</th>
                                                <th className="p-3">Pulse Rate</th>
                                                <th className="p-3">Context Details</th>

                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {bp.map((b) => (

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
